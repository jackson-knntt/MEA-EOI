# Sends the MEA acceptance email to newly accepted EOI applicants.
# Runs every 15 minutes. Can also be triggered manually from the
# Actions tab via "Run workflow" (useful for testing).
#
# Requires these repository secrets (Settings > Secrets and variables > Actions):
#   NOTION_TOKEN
#   NOTION_EOI_DATABASE_ID
#   EMAILJS_SERVICE_ID
#   EMAILJS_TEMPLATE_ID
#   EMAILJS_PUBLIC_KEY
#   EMAILJS_PRIVATE_KEY
#
# Note: GitHub automatically disables scheduled workflows after 60 days
# of no repository activity. GitHub emails a warning first — re-enable
# from the Actions tab if that happens.

name: Send acceptance emails

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: acceptance-emails
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Send acceptance emails
        run: node scripts/send-acceptance-emails.mjs
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_EOI_DATABASE_ID: ${{ secrets.NOTION_EOI_DATABASE_ID }}
          EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          EMAILJS_PRIVATE_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}

